name: CI/CD – Rugby SkyCatch

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint
      - run: npm test

  build:
    name: Build Docker + Integration
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t rugby-skycatch:ci .
      - run: |
          docker run -d --name test-app -p 8080:80 rugby-skycatch:ci
          sleep 3
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/
          curl -f http://localhost:8080/stats/
      - if: always()
        run: docker stop test-app && docker rm test-app || true

name: CI/CD – Rugby SkyCatch

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1 : Qualité & Tests
  # ──────────────────────────────────────────────────
  quality:
    name: 🔍 Lint + Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

      - name: Tests unitaires (Jest + couverture)
        run: npm test

      - name: Vérification des fichiers requis
        run: |
          for f in index.html Dockerfile docker-compose.yml nginx.conf README.md src/game.js stats/index.html; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f manquant" && exit 1)
          done

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────
  # JOB 2 : Build Docker + Tests d'intégration
  # ──────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker + Intégration
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t rugby-skycatch:ci-${{ github.sha }} .

      - name: Démarrage du conteneur
        run: |
          docker run -d --name test-app -p 8080:80 rugby-skycatch:ci-${{ github.sha }}
          sleep 3

      - name: Test endpoint /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          [ "$STATUS" = "200" ] && echo "✅ /health OK" || (echo "❌ /health KO ($STATUS)" && exit 1)

      - name: Test page principale
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          [ "$STATUS" = "200" ] && echo "✅ / OK" || (echo "❌ / KO ($STATUS)" && exit 1)

      - name: Test page /stats
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/stats/)
          [ "$STATUS" = "200" ] && echo "✅ /stats OK" || (echo "❌ /stats KO ($STATUS)" && exit 1)

      - name: Vérification contenu index.html
        run: |
          curl -s http://localhost:8080/ | grep -q "Rugby SkyCatch" && echo "✅ Titre OK" || (echo "❌ Titre manquant" && exit 1)
          curl -s http://localhost:8080/ | grep -q "gameCanvas"      && echo "✅ Canvas OK" || (echo "❌ Canvas manquant" && exit 1)
          curl -s http://localhost:8080/ | grep -q "GAME_START"      && echo "✅ Log GAME_START OK" || (echo "❌ GAME_START manquant" && exit 1)

      - name: Vérification contenu /stats
        run: |
          curl -s http://localhost:8080/stats/ | grep -q "Statistiques globales" && echo "✅ Stats OK" || (echo "❌ Stats KO" && exit 1)

      - name: Vérification que game.js est servi
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/src/game.js)
          [ "$STATUS" = "200" ] && echo "✅ game.js OK" || (echo "❌ game.js KO ($STATUS)" && exit 1)

      - name: Logs du conteneur (debug)
        if: always()
        run: docker logs test-app || true

      - name: Nettoyage
        if: always()
        run: |
          docker stop test-app 2>/dev/null || true
          docker rm   test-app 2>/dev/null || true

  # ──────────────────────────────────────────────────
  # JOB 3 : Déploiement (main uniquement)
  # ──────────────────────────────────────────────────
  deploy:
    name: 🚀 Déploiement continu
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rugby-skycatch:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rugby-skycatch:${{ github.sha }}

      - name: Déploiement SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            cd ~/rugby-skycatch
            git pull origin main
            docker compose pull
            docker compose down
            docker compose up -d
            echo "✅ Déployé le $(date)"

      - name: Résumé
        run: |
          echo "🏉 Déploiement terminé"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/rugby-skycatch:${{ github.sha }}"
